site_name: unofficial-guide-uds-bioinformatics
site_url: https://b-horvath.github.io/unofficial-guide-uds-bioinformatics/
theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
nav:
  - Home: index.md
  - Etiquette:
      # Learned helplessness?
      - When to Ask for Help: ask-for-help.md
      - Emailing Professors: email-prof.md
  - Courses:
      - Choosing Courses: courses.md
      - Study Regulations: regulations.md
  - Adding to the Website: add-website.md
